<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <script>
      (function () {
        var root = document.documentElement;
        var storedTheme;
        var storedFont;

        try {
          storedTheme = localStorage.getItem('theme');
          storedFont = localStorage.getItem('fontSize');
        } catch (error) {}

        root.dataset.theme = storedTheme === 'dark' ? 'dark' : 'light';

        // No whitelist needed: unknown values match no CSS rule, so --font-scale stays 1.
        root.dataset.font = storedFont || 'medium';
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link id="theme-favicon" rel="icon" href="{{ '/assets/favicons/favicon-light.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=IBM+Plex+Mono:wght@100;300&family=JetBrains+Mono:wght@200;300;400;500&display=swap">
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  </head>
  <body>
    <div class="settings">
      <button class="settings-toggle" type="button" aria-label="Settings" aria-expanded="false" aria-controls="settings-panel">
        <svg class="settings-toggle__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3.5 8h9M17.9 8h2.6M3.5 16h3.4M11.9 16h8.6"></path>
          <circle cx="15.2" cy="8" r="2.2"></circle>
          <circle cx="9.2" cy="16" r="2.2"></circle>
        </svg>
      </button>
      <div class="settings-panel" id="settings-panel" role="group" aria-label="Display settings" hidden>
        <div class="settings-row">
          <span class="settings-row__label">Theme</span>
          <button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false">
            <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 14.2A7.8 7.8 0 0 1 9.8 4a8.2 8.2 0 1 0 10.2 10.2Z"></path>
            </svg>
            <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2.8v2.1M12 19.1v2.1M4.9 4.9l1.5 1.5M17.6 17.6l1.5 1.5M2.8 12h2.1M19.1 12h2.1M4.9 19.1l1.5-1.5M17.6 6.4l1.5-1.5"></path>
            </svg>
          </button>
        </div>
        <div class="settings-row">
          <span class="settings-row__label">Text size</span>
          <div class="font-size" role="group" aria-label="Text size">
            <button class="font-size__btn font-size__btn--small" type="button" data-font-size="small" aria-label="Small text" aria-pressed="false">A</button>
            <button class="font-size__btn font-size__btn--medium" type="button" data-font-size="medium" aria-label="Medium text" aria-pressed="true">A</button>
            <button class="font-size__btn font-size__btn--large" type="button" data-font-size="large" aria-label="Large text" aria-pressed="false">A</button>
          </div>
        </div>
      </div>
    </div>
    <main class="page">
      {{ content }}
    </main>
    <script>
      (function () {
        var root = document.documentElement;
        var toggle = document.querySelector('.theme-toggle');
        var favicon = document.querySelector('#theme-favicon');

        function persistSetting(key, value) {
          try {
            localStorage.setItem(key, value);
          } catch (error) {}
        }
        var faviconByTheme = {
          light: "{{ '/assets/favicons/favicon-light.svg' | relative_url }}",
          dark: "{{ '/assets/favicons/favicon-dark.svg' | relative_url }}"
        };

        function updateToggle(theme) {
          if (!toggle) return;

          var isDark = theme === 'dark';
          toggle.setAttribute('aria-pressed', String(isDark));
          toggle.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
        }

        function updateFavicon(theme) {
          if (!favicon) return;

          favicon.setAttribute('href', faviconByTheme[theme] || faviconByTheme.light);
        }

        function updateTheme(theme) {
          root.dataset.theme = theme;
          updateToggle(theme);
          updateFavicon(theme);
        }

        updateTheme(root.dataset.theme || 'light');

        if (toggle) {
          toggle.addEventListener('click', function () {
            var theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
            updateTheme(theme);
            persistSetting('theme', theme);
          });
        }

        // Text size setting
        var fontButtons = document.querySelectorAll('.settings-panel [data-font-size]');

        function updateFont(size) {
          root.dataset.font = size;
          for (var i = 0; i < fontButtons.length; i++) {
            fontButtons[i].setAttribute('aria-pressed', String(fontButtons[i].dataset.fontSize === size));
          }
        }

        updateFont(root.dataset.font || 'medium');

        for (var i = 0; i < fontButtons.length; i++) {
          fontButtons[i].addEventListener('click', function () {
            var size = this.dataset.fontSize;
            updateFont(size);
            persistSetting('fontSize', size);
          });
        }

        // Settings panel
        var settings = document.querySelector('.settings');
        var settingsToggle = document.querySelector('.settings-toggle');
        var settingsPanel = document.querySelector('.settings-panel');

        function openSettings() {
          if (!settingsPanel) return;
          settingsPanel.hidden = false;
          settingsToggle.setAttribute('aria-expanded', 'true');
        }

        function closeSettings() {
          if (!settingsPanel) return;
          settingsPanel.hidden = true;
          settingsToggle.setAttribute('aria-expanded', 'false');
        }

        if (settingsToggle && settingsPanel) {
          settingsToggle.addEventListener('click', function () {
            if (settingsPanel.hidden) {
              openSettings();
            } else {
              closeSettings();
            }
          });

          // pointerdown (not click): iOS Safari doesn't synthesize click events
          // for taps on non-interactive elements, so tap-outside would not close.
          document.addEventListener('pointerdown', function (event) {
            if (!settingsPanel.hidden && !settings.contains(event.target)) {
              closeSettings();
            }
          });

          document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && !settingsPanel.hidden) {
              closeSettings();
              settingsToggle.focus();
            }
          });
        }
      })();
    </script>
  </body>
</html>
